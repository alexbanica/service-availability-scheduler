<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service Availability - Reset Password</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body class="login-body">
    <div id="reset-password-app" v-cloak>
      <main class="login-card">
        <div class="login-header">
          <div>
            <h1>Reset Password</h1>
            <p>Set a new password for your account.</p>
          </div>
          <button
            class="theme-toggle"
            type="button"
            @click="toggleTheme"
            :aria-label="themeLabel"
            :title="themeLabel"
          >
            <span v-if="theme === 'dark'" class="theme-icon sun" aria-hidden="true"></span>
            <span v-else class="theme-icon moon" aria-hidden="true"></span>
          </button>
        </div>

        <div v-if="loading">Checking token…</div>

        <div v-if="tokenError" class="error">
          {{ tokenError }}
        </div>

        <form v-if="isTokenValid && !submitted" @submit.prevent="submitReset">
          <label for="reset-password">New password</label>
          <input
            id="reset-password"
            v-model="password"
            type="password"
            autocomplete="new-password"
            placeholder="At least 8 characters"
            required
          >
          <label for="reset-password-confirmation">Confirm new password</label>
          <input
            id="reset-password-confirmation"
            v-model="confirmPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Repeat new password"
            required
          >
          <button type="submit" :disabled="submitting">
            {{ submitting ? 'Saving...' : 'Save password' }}
          </button>
          <div class="error">{{ error }}</div>
        </form>

        <div v-if="submitted">
          <p>Password updated.</p>
          <a href="/login">Return to login</a>
        </div>
      </main>
      <footer class="site-footer login-footer">
        <span>Service Availability Scheduler</span>
        <span v-if="appVersion" class="muted">Version {{ appVersion }}</span>
      </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script type="module" src="/public/js/reset-password.js"></script>
  </body>
</html>
