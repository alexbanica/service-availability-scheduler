openapi: 3.0.3
info:
  title: Service Availability Scheduler API
  version: 0.1.0
  description: API for password login, registration, account activation, password reset, workspace administration, service availability, and reservations.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Account
  - name: Metadata
  - name: Services
  - name: Reservations
  - name: Workspaces
  - name: Workspace services
  - name: Workspace resources
paths:
  /api/login:
    post:
      tags: [Auth]
      security: []
      summary: Log in by email and password and receive a bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated user and bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/password-reset/captcha:
    post:
      tags: [Account]
      security: []
      summary: Create a password-reset CAPTCHA challenge.
      responses:
        '200':
          description: CAPTCHA challenge prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaResponse'
  /api/password-reset/request:
    post:
      tags: [Account]
      security: []
      summary: Request a password-reset token after solving CAPTCHA.
      description: Always returns ok for known and unknown emails; reset links are logged server-side until email delivery exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/password-reset/validate:
    post:
      tags: [Account]
      security: []
      summary: Validate a password-reset token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/password-reset:
    post:
      tags: [Account]
      security: []
      summary: Set a new password using a valid reset token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/register/captcha:
    post:
      tags: [Account]
      security: []
      summary: Create a registration CAPTCHA challenge.
      responses:
        '200':
          description: CAPTCHA challenge prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaResponse'
  /api/register:
    post:
      tags: [Account]
      security: []
      summary: Register a non-activated user and receive a bearer token.
      description: Activation links are logged server-side until email delivery exists. When invitation_code is supplied, the registered email must match the invitation email and member workspace access is created in the registration transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered user and bearer token with activated=false.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/account-activation/validate:
    post:
      tags: [Account]
      security: []
      summary: Validate an account-activation token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/account-activation:
    post:
      tags: [Account]
      security: []
      summary: Activate an account and receive a bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Activated user and bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /api/logout:
    post:
      tags: [Auth]
      summary: Log out the current bearer-token session client-side.
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '401':
          $ref: '#/components/responses/Error'
  /api/me:
    get:
      tags: [Auth]
      summary: Return the authenticated user identity.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Error'
  /api/renew:
    post:
      tags: [Auth]
      summary: Issue a fresh bearer token for the current user.
      responses:
        '200':
          description: Renewed token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error'
  /api/app-info:
    get:
      tags: [Metadata]
      security: []
      summary: Return public application metadata.
      responses:
        '200':
          description: Application metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInfoResponse'
  /api/services:
    get:
      tags: [Services]
      summary: List visible services and reservation state.
      responses:
        '200':
          description: Services grouped by workspace service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/claim:
    post:
      tags: [Reservations]
      summary: Claim one service environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
      responses:
        '200':
          description: Claim accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpiresResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/release:
    post:
      tags: [Reservations]
      summary: Release an active reservation owned by the current user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceKeyRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/extend:
    post:
      tags: [Reservations]
      summary: Extend an active reservation owned by the current user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceKeyRequest'
      responses:
        '200':
          description: Extension accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpiresResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/events:
    get:
      tags: [Reservations]
      summary: Stream expiring reservation events as server-sent events.
      responses:
        '200':
          description: text/event-stream response with expiring events.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /events:
    get:
      tags: [Reservations]
      summary: Legacy server-sent event stream for expiring reservation events.
      responses:
        '200':
          description: text/event-stream response with expiring events.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces visible to the current user.
      responses:
        '200':
          description: Workspace summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesResponse'
        '401':
          $ref: '#/components/responses/Error'
    post:
      tags: [Workspaces]
      summary: Create a workspace owned by the current user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Created workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/services:
    get:
      tags: [Workspace services]
      summary: List the editable service catalog for a workspace.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace service catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceServicesResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags: [Workspace services]
      summary: Create a workspace service and its environment links.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertWorkspaceServiceRequest'
      responses:
        '201':
          description: Created service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceServiceCreated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/services/{serviceId}:
    patch:
      tags: [Workspace services]
      summary: Update a workspace service.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertWorkspaceServiceRequest'
      responses:
        '200':
          description: Updated service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceServiceUpdated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Workspace services]
      summary: Delete a workspace service.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '204':
          description: Service deleted.
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/environments:
    get:
      tags: [Workspace resources]
      summary: List workspace environments.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace environments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags: [Workspace resources]
      summary: Create a workspace environment.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Created environment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentCreated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/environments/{environmentId}:
    delete:
      tags: [Workspace resources]
      summary: Delete a workspace environment.
      description: Resource administrators only. Removes the environment row and its service associations without deleting services.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/EnvironmentId'
      responses:
        '204':
          description: Environment deleted.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/owners:
    get:
      tags: [Workspace resources]
      summary: List workspace owners.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace owners.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnersResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags: [Workspace resources]
      summary: Create a workspace owner.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Created owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerCreated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/owners/{ownerId}:
    delete:
      tags: [Workspace resources]
      summary: Delete a workspace owner.
      description: Resource administrators only. Clears matching service owner references before deleting the owner row, preserving services.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/OwnerId'
      responses:
        '204':
          description: Owner deleted.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/detail/{resourceType}:
    get:
      tags: [Workspace resources]
      summary: List workspace popup rows for users, services, owners, or environments.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
            enum: [users, services, owners, environments]
      responses:
        '200':
          description: Popup row items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopupRowsResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/invitations:
    post:
      tags: [Workspace resources]
      summary: Create a workspace invitation link by email.
      description: Workspace admins and managers may invite existing or unregistered emails. The raw invitation link is logged server-side and is never returned in the response.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserRequest'
      responses:
        '201':
          description: Created workspace invitation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationCreated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/workspace-invitations/{code}/validate:
    get:
      tags: [Workspace invitations]
      security: []
      summary: Validate a workspace invitation code.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation validation state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvitationValidationResponse'
  /api/workspace-invitations/{code}/accept:
    post:
      tags: [Workspace invitations]
      summary: Accept an existing-user workspace invitation.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/users:
    get:
      tags: [Workspace resources]
      summary: List workspace users and invitation rows.
      description: Workspace admins and managers may read accepted users plus pending or expired invitation rows. Role mutation and membership removal remain admin-only accepted-user actions.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace users with roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceUsersResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/users/{userId}:
    delete:
      tags: [Workspace resources]
      summary: Remove a user membership from a workspace.
      description: Admin-only endpoint. Removing the current workspace owner's own membership or removing the only workspace admin returns 409.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Workspace user removed.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/workspaces/{workspaceId}/users/{userId}/role:
    patch:
      tags: [Workspace resources]
      summary: Update a workspace user's role.
      description: Admin-only endpoint. Role changes are scoped to the target workspace, preserve the single-admin invariant, and reject current workspace owner self-demotion.
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceUserRoleRequest'
      responses:
        '200':
          description: Updated user role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceUserRoleUpdated'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
    OwnerId:
      name: ownerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentId:
      name: environmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
  responses:
    Ok:
      description: Successful operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OkResponse'
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
    CaptchaResponse:
      type: object
      required: [ok, challenge_id, challenge_prompt]
      properties:
        ok:
          type: boolean
        challenge_id:
          type: string
        challenge_prompt:
          type: string
    PasswordResetRequest:
      type: object
      required: [email, challenge_id, challenge_answer]
      properties:
        email:
          type: string
          format: email
        challenge_id:
          type: string
        challenge_answer:
          type: string
        invitation_code:
          type: string
          description: Optional workspace invitation code from a valid unregistered invitation link.
    TokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Also accepted as reset_token or activation_token by the matching endpoint.
    ResetPasswordRequest:
      type: object
      required: [token, password, confirm_password]
      properties:
        token:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        confirm_password:
          type: string
          format: password
          minLength: 8
    RegisterRequest:
      type: object
      required:
        - email
        - nickname
        - password
        - confirm_password
        - challenge_id
        - challenge_answer
      properties:
        email:
          type: string
          format: email
        nickname:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        confirm_password:
          type: string
          format: password
          minLength: 8
        challenge_id:
          type: string
        challenge_answer:
          type: string
    LoginResponse:
      type: object
      required: [ok, user, token, token_type, expires_in_seconds]
      properties:
        ok:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in_seconds:
          type: integer
    User:
      type: object
      required: [id, email, nickname, activated]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          description: Present on login responses that return the domain user object.
        email:
          type: string
          format: email
        nickname:
          type: string
        activated:
          type: boolean
    AppInfoResponse:
      type: object
      required: [version]
      properties:
        version:
          type: string
    ServiceKeyRequest:
      type: object
      required: [service_key]
      properties:
        service_key:
          type: string
    ClaimRequest:
      allOf:
        - $ref: '#/components/schemas/ServiceKeyRequest'
        - type: object
          properties:
            claimed_by_label:
              type: string
            claimed_by_team:
              type: boolean
              default: false
    ExpiresResponse:
      type: object
      required: [ok, expires_at]
      properties:
        ok:
          type: boolean
        expires_at:
          type: string
          format: date-time
    ServicesResponse:
      type: object
      required: [expiry_warning_minutes, auto_refresh_seconds, services]
      properties:
        expiry_warning_minutes:
          type: integer
        auto_refresh_seconds:
          type: integer
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceSummary'
    ServiceSummary:
      type: object
      required:
        - service_id
        - label
        - default_minutes
        - workspace_id
        - workspace_name
        - environments
      properties:
        service_id:
          type: string
        label:
          type: string
        default_minutes:
          type: integer
        owner:
          type: string
          nullable: true
        workspace_id:
          type: string
          format: uuid
        workspace_name:
          type: string
        environments:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEnvironmentStatus'
    ServiceEnvironmentStatus:
      type: object
      required:
        - service_key
        - environment_id
        - environment
        - active
        - claimed_by_team
      properties:
        service_key:
          type: string
        environment_id:
          type: string
          format: uuid
        environment:
          type: string
        active:
          type: boolean
        claimed_by:
          type: string
          nullable: true
        claimed_by_id:
          type: string
          nullable: true
          format: uuid
        claimed_at:
          type: string
          nullable: true
          format: date-time
        expires_at:
          type: string
          nullable: true
          format: date-time
        claimed_by_team:
          type: boolean
    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    WorkspaceCreated:
      type: object
      required: [id, name, admin_user_id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        admin_user_id:
          type: string
          format: uuid
        current_user_role:
          $ref: '#/components/schemas/WorkspaceRole'
    WorkspacesResponse:
      type: object
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceSummary'
    WorkspaceSummary:
      allOf:
        - $ref: '#/components/schemas/WorkspaceCreated'
        - type: object
          required:
            - user_count
            - service_count
            - owner_count
            - environment_count
          properties:
            user_count:
              type: integer
            service_count:
              type: integer
            owner_count:
              type: integer
            environment_count:
              type: integer
            current_user_role:
              $ref: '#/components/schemas/WorkspaceRole'
    WorkspaceRole:
      type: string
      enum: [admin, manager, member]
      description: Workspace-scoped role. Admins manage users and resources; managers manage non-user resources; members use availability and reservation workflows.
    UpsertWorkspaceServiceRequest:
      type: object
      required: [label, default_minutes]
      properties:
        service_id:
          type: string
          nullable: true
          description: Optional on create; required by the path on update.
        label:
          type: string
        default_minutes:
          type: integer
        owner_id:
          type: string
          format: uuid
          nullable: true
        environment_ids:
          type: array
          items:
            type: string
            format: uuid
        environment_names:
          type: array
          items:
            type: string
    WorkspaceServiceCreated:
      type: object
      required: [service_id, created_environments]
      properties:
        service_id:
          type: string
        created_environments:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
    WorkspaceServiceUpdated:
      type: object
      required: [service_id]
      properties:
        service_id:
          type: string
    WorkspaceServicesResponse:
      type: object
      required: [services]
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceServiceCatalogItem'
    WorkspaceServiceCatalogItem:
      type: object
      required: [service_id, label, default_minutes, environments]
      properties:
        service_id:
          type: string
        label:
          type: string
        owner:
          type: string
          nullable: true
        owner_id:
          type: string
          format: uuid
          nullable: true
        default_minutes:
          type: integer
        environments:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
    NameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    Environment:
      type: object
      required: [environment_id, environment_name]
      properties:
        environment_id:
          type: string
          format: uuid
        environment_name:
          type: string
    EnvironmentCreated:
      type: object
      required: [environment_id]
      properties:
        environment_id:
          type: string
          format: uuid
    EnvironmentsResponse:
      type: object
      required: [environments]
      properties:
        environments:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
    Owner:
      type: object
      required: [owner_id, name]
      properties:
        owner_id:
          type: string
          format: uuid
        name:
          type: string
    OwnerCreated:
      type: object
      required: [owner_id]
      properties:
        owner_id:
          type: string
          format: uuid
    OwnersResponse:
      type: object
      required: [owners]
      properties:
        owners:
          type: array
          items:
            $ref: '#/components/schemas/Owner'
    PopupRowsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PopupRow'
    PopupRow:
      type: object
      required: [name]
      properties:
        name:
          type: string
        ownerId:
          type: string
          format: uuid
          description: Present on owner detail rows.
        environmentId:
          type: string
          format: uuid
          description: Present on environment detail rows.
    WorkspaceUser:
      type: object
      required: [user_id, email, role]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        activated:
          type: boolean
          description: Present for accepted user rows.
        invitation_id:
          type: string
          format: uuid
          description: Present for pending or expired invitation rows.
        invitation_status:
          type: string
          enum: [pending, expired]
          description: Present for invitation rows.
        invitation_expires_at:
          type: string
          format: date-time
        invited_by_user_id:
          type: string
          format: uuid
        invited_user_id:
          type: string
          format: uuid
          nullable: true
    WorkspaceUsersResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceUser'
    UpdateWorkspaceUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/WorkspaceRole'
    WorkspaceUserRoleUpdated:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/WorkspaceRole'
    InviteUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    InvitationCreated:
      type: object
      required:
        - invitation_id
        - workspace_id
        - invited_by_user_id
        - status
      properties:
        invitation_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        invited_user_id:
          type: string
          format: uuid
          nullable: true
        invited_by_user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, accepted, revoked]
    WorkspaceInvitationValidationResponse:
      type: object
      required: [status, existing_user_invite, invitation]
      properties:
        status:
          type: string
          enum: [invalid, expired, used, wrong_user, unregistered, valid]
        existing_user_invite:
          type: boolean
        invitation:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/WorkspaceInvitationContext'
    WorkspaceInvitationContext:
      type: object
      required: [workspace_id, invited_by_user_id, invited_email, expires_at]
      properties:
        workspace_id:
          type: string
          format: uuid
        invited_user_id:
          type: string
          format: uuid
          nullable: true
        invited_by_user_id:
          type: string
          format: uuid
        invited_email:
          type: string
          format: email
        expires_at:
          type: string
          format: date-time
